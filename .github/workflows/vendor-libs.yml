name: Vendor third-party libs
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  vendor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download html5-qrcode
        run: |
          curl -sSfL "https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.10/html5-qrcode.min.js" \
            -o html5-qrcode.min.js
          test -s html5-qrcode.min.js
          wc -c html5-qrcode.min.js

      - name: Commit if changed
        run: |
          if git diff --quiet html5-qrcode.min.js 2>/dev/null && git ls-files --error-unmatch html5-qrcode.min.js >/dev/null 2>&1; then
            echo "html5-qrcode.min.js sin cambios"
            exit 0
          fi
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add html5-qrcode.min.js
          git commit -m "Vendor html5-qrcode.min.js (auto)" -m "[skip ci]"
          git push
