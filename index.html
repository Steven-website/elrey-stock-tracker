<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#f0f2f5" id="meta-theme-color" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Inventario El Rey" />
<title>Inventario · El Rey</title>

<link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22Inventario%20El%20Rey%22%2C%22short_name%22%3A%22Inventario%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f0f2f5%22%2C%22theme_color%22%3A%22%23f0f2f5%22%2C%22icons%22%3A%5B%5D%7D" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>try{var _t=localStorage.getItem('elrey_theme');if(_t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.getElementById('meta-theme-color')&&(document.getElementById('meta-theme-color').content='#0f172a');}else{document.documentElement.removeAttribute('data-theme');}}catch(_){}</script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">
  <div style="padding:40px 20px; text-align:center; font-family:-apple-system,sans-serif;">
    <h2 style="color:#f59f0b; margin-bottom:8px;">Cargando Inventario El Rey…</h2>
    <p style="color:#666; font-size:13px;">Si este mensaje queda fijo más de 10 segundos:</p>
    <ol style="text-align:left; color:#666; font-size:12px; max-width:320px; margin:12px auto;">
      <li>Asegurate de tener internet</li>
      <li>Refrescá la página (pull-to-refresh)</li>
      <li>Si seguís trabado, abrí en una pestaña privada</li>
    </ol>
    <p style="color:#aaa; font-size:11px; margin-top:24px;">build 2026-05-02 · v32</p>
  </div>
</div>
<div id="toast-container"></div>

<noscript>
  <div style="padding:40px 20px; text-align:center; font-family:sans-serif; color:#dc2626;">
    <h2>JavaScript desactivado</h2>
    <p>Esta app necesita JavaScript habilitado para funcionar.</p>
  </div>
</noscript>

<!-- Listener global de errores: si algún script revienta, mostralo -->
<script>
  window.addEventListener('error', e => {
    var app = document.getElementById('app');
    if (app && app.children.length <= 1) {
      app.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#dc2626;font-family:-apple-system,sans-serif;">' +
        '<h2>Error al cargar la app</h2>' +
        '<p style="font-family:monospace;font-size:12px;background:#fee;padding:12px;text-align:left;overflow:auto;">' +
        (e.message || 'Error desconocido') + '<br>' +
        (e.filename || '') + ':' + (e.lineno || '') + '</p>' +
        '<p style="color:#666;font-size:11px;">Mandá screenshot de este error.</p>' +
        '</div>';
    }
  }, true);
  window.addEventListener('unhandledrejection', e => {
    console.error('Unhandled:', e.reason);
  });
</script>

<!-- Librerías locales (vendorizadas) y CDN -->
<script src="./html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<!-- Aplicación (módulos ES) -->
<script type="module" src="./main.js"></script>

<!-- Service Worker desactivado: ya no se registra. Si el navegador tiene -->
<!-- un SW viejo registrado, el sw.js actual es un no-op para que no -->
<!-- intercepte y se desinstale solo con el tiempo. -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister().catch(() => {}));
    }).catch(() => {});
  }
</script>
</body>
</html>
